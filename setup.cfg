[tool:pytest]
testpaths = tests
addopts = -v --tb=short

[flake8]
max-line-length = 100
exclude = .git,__pycache__,.venv,build,dist
ignore = E203,W503

[mypy]
python_version = 3.10
ignore_missing_imports = True
disallow_untyped_defs = True
warn_return_any = True

[isort]
profile = black
line_length = 100
